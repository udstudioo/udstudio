<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDStudio</title>
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<header>
    <div class="cabecalho">
        <h1 id="nome-estudio">UDStudio</h1>
    </div>
</header>
<body>

    <div class="container-jogos-principal">
        <div class="container-jogo-individual">
            <div class="imagem-logo">
                <img src="assets/imagens/capa_sozinho.png" alt="Capa do jogo Sozinho">
            </div>
            <div class="informacoes-jogo">
                <h3 class="nome-jogo">Sozinho</h3>
                <p class="descricao-curta">Um jogo de terror, terror-psicológico em 2D,
                    baseado em puzzles e mistérios a ser desvendados sobre uma criança deixada sozinha.
                    Mecânicas envolventes, história marcante.</p>

                <div class="botoes-loja">
                    <a href="https://play.google.com/store/apps/details?id=uesleidaniel.udstudio.sozinho" target="_blank" rel="noopener" class="link-loja">
                    <button class="playstore" onclick="">Play Store</button>
                    </a>

                    <a href="https://store.steampowered.com/app/4226680" target="_blank" rel="noopener" class="link-loja">
                    <button class="steam" onclick="">Steam</button>
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
